# https://tmuxcheatsheet.com/

##### PREFIX ############################################################

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

##### TERMINAL ##########################################################

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -sg escape-time 10
set -g focus-events on

##### MOUSE #############################################################

set -g mouse on
bind v if -F "#{mouse}" "set -g mouse off; display-message 'Mouse disabled'" "set -g mouse on; display-message 'Mouse enabled'"

##### COPY MODE #########################################################

setw -g mode-keys vi
set -g set-clipboard on

bind -n C-S-c run "tmux copy-pipe-and-cancel 'xclip -sel clip -i'"
bind -n C-S-v run "tmux set-buffer \"$(xclip -o -sel clip)\"; tmux paste-buffer"

bind M copy-mode

##### PANE MANAGEMENT ###################################################

bind-key b setw synchronize-panes \; display-message "Sync-Panes #{?pane_synchronized,on,off}"
bind-key z resize-pane -Z

bind | split-window -h
bind _ split-window -v

bind -n M-Left resize-pane -L
bind -n M-Right resize-pane -R
bind -n M-Up resize-pane -U
bind -n M-Down resize-pane -D

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### SESSION MANAGEMENT ###############################################

bind K kill-pane
bind X confirm-before -p "Kill all sessions? (y/n)" "kill-server"
bind r source-file ~/.tmux.conf \; display "Reloaded!"

##### WINDOW BEHAVIOR ###################################################

setw -g automatic-rename on

##### PERFORMANCE #######################################################

set -g history-limit 10000
set -g status-interval 3
set -g repeat-time 300

##### PLUGINS ###########################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'spywhere/tmux-named-snapshot'
# Named snapshot bindings: intuitive keys without conflicts
# S for Save, R for Restore (note: reload is lowercase 'r')
set -g @named-snapshot-save "S:manual"
set -g @named-snapshot-restore "R:*"
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'xamut/tmux-network-bandwidth'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'noscript/tmux-mighty-scroll'

##### STATUS BAR ########################################################

set -g status on
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

setw -g window-status-style "fg=#6c7086,bg=#1e1e2e"
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

set -g status-left-length 60
set -g status-left "#[fg=#89b4fa]#H #[fg=#6c7086]| #[fg=#cdd6f4]#S #[fg=#6c7086]| #[fg=#a6e3a1]#{b:pane_current_path} "

set -g status-right-length 100
set -g status-right "#[fg=#6c7086]↓ #[fg=#a6e3a1]#{network_bandwidth} #[fg=#6c7086]| CPU #[fg=#fab387]#{cpu_percentage} #[fg=#6c7086]| #[fg=#89b4fa]%H:%M:%S"

set -g message-style "fg=#f9e2af,bg=#1e1e2e"

##### TPM ###############################################################

run '~/.tmux/plugins/tpm/tpm'
